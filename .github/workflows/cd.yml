name: CD

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check app tests scripts
          ruff format --check app tests scripts

      - name: Run full test suite
        run: pytest tests/ -v --tb=short
        env:
          MOCK_PROVIDER: "true"
          API_KEYS: test-key

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: [test, publish]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    # Required repo secrets (Settings → Secrets and variables → Actions):
    #   DROPLET_HOST     — Droplet IP or hostname
    #   DROPLET_USER     — SSH user (e.g. root)
    #   DROPLET_SSH_KEY  — private key authorized on the Droplet
    # Job fails early with a clear message if any are missing (avoids drone-ssh "missing server host").
    steps:
      - name: Check deploy secrets
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DROPLET_HOST" ] && missing+=(DROPLET_HOST)
          [ -z "$DROPLET_USER" ] && missing+=(DROPLET_USER)
          [ -z "$DROPLET_SSH_KEY" ] && missing+=(DROPLET_SSH_KEY)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Deploy secrets missing: ${missing[*]}. Add them under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "Deploy secrets present (host length=${#DROPLET_HOST}, user length=${#DROPLET_USER}, key length=${#DROPLET_SSH_KEY})."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.sha }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GH_TOKEN,REPO,REF
          script: |
            set -euo pipefail
            cd /opt/batch-inference

            # Prefer HTTPS + GITHUB_TOKEN so a private repo can be pulled without a deploy key.
            if [ -n "${GH_TOKEN:-}" ]; then
              git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            fi

            git fetch --prune origin
            git checkout -B master "origin/master" 2>/dev/null \
              || git checkout -B main "origin/main"

            GIT_SHA="$(git rev-parse --short HEAD)"
            BUILD_ID="${REF}"
            BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            upsert_env() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            if [ ! -f .env ]; then
              echo "ERROR: /opt/batch-inference/.env missing — create it before deploying" >&2
              exit 1
            fi

            upsert_env GIT_SHA "$GIT_SHA"
            upsert_env BUILD_ID "$BUILD_ID"
            upsert_env BUILT_AT "$BUILT_AT"

            export GIT_SHA BUILD_ID BUILT_AT
            docker compose up --build -d

            echo "Waiting for health..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:8000/health; then
                echo
                echo "Deploy OK — GIT_SHA=${GIT_SHA}"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after deploy" >&2
            docker compose ps
            docker compose logs --tail=80 api
            exit 1
