services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: batch
      POSTGRES_PASSWORD: batch
      POSTGRES_DB: batch_inference
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batch -d batch_inference"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/batch-inference || true &&
      exit 0
      "

  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://batch:batch@postgres:5432/batch_inference
      REDIS_URL: redis://redis:6379/0
      SPACES_ENDPOINT_URL: http://minio:9000
      SPACES_ACCESS_KEY: minioadmin
      SPACES_SECRET_KEY: minioadmin
      SPACES_BUCKET: batch-inference
      SPACES_REGION: us-east-1
      SPACES_FORCE_PATH_STYLE: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  worker:
    build: .
    command: arq app.workers.main.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://batch:batch@postgres:5432/batch_inference
      REDIS_URL: redis://redis:6379/0
      SPACES_ENDPOINT_URL: http://minio:9000
      SPACES_ACCESS_KEY: minioadmin
      SPACES_SECRET_KEY: minioadmin
      SPACES_BUCKET: batch-inference
      SPACES_REGION: us-east-1
      SPACES_FORCE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: "32"
      MOCK_PROVIDER: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app
    deploy:
      replicas: 1

volumes:
  pgdata:
  miniodata:
